openapi: 3.0.3
info:
  title: English Anywhere Lab API
  version: 0.2.0
  description: |
    API contract for English Anywhere Lab.
    Base path is /api/v1.
    Covers M1 (Auth, Profile, Plan, Review, Progress) and R2-Step1 (Pack).
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Profile
  - name: Plan
  - name: Review
  - name: Pack
  - name: Progress
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me:
    get:
      tags: [Profile]
      summary: Get current user
      operationId: getMe
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me/profile:
    patch:
      tags: [Profile]
      summary: Update learning profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /plans/bootstrap:
    post:
      tags: [Plan]
      summary: Bootstrap the first weekly plan
      operationId: bootstrapPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapPlanRequest'
      responses:
        '200':
          description: Plan generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyPlanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /plans/today:
    get:
      tags: [Plan]
      summary: Get today's learning plan
      operationId: getTodayPlan
      parameters:
        - in: query
          name: timezone
          schema:
            type: string
          required: false
      responses:
        '200':
          description: Today plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlanResponse'

  /plans/{plan_id}/tasks/{task_id}/complete:
    post:
      tags: [Plan]
      summary: Mark task completed
      operationId: completeTask
      parameters:
        - $ref: '#/components/parameters/PlanId'
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteTaskRequest'
      responses:
        '200':
          description: Completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCompletionResponse'

  /reviews/queue:
    get:
      tags: [Review]
      summary: Get due review cards
      operationId: getReviewQueue
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 30
      responses:
        '200':
          description: Review queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewQueueResponse'

  /reviews/submit:
    post:
      tags: [Review]
      summary: Submit one review result
      operationId: submitReview
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewSubmitRequest'
      responses:
        '200':
          description: Review accepted (duplicate Idempotency-Key or client_event_id returns the original result with 200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSubmitResponse'

  /packs:
    get:
      tags: [Pack]
      summary: List learning packs
      operationId: listPacks
      parameters:
        - in: query
          name: domain
          schema:
            type: string
        - in: query
          name: level
          schema:
            $ref: '#/components/schemas/CefrLevel'
        - in: query
          name: source
          schema:
            type: string
            enum: [official, ai]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Pack list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackListResponse'

  /packs/{pack_id}:
    get:
      tags: [Pack]
      summary: Get pack detail
      operationId: getPackDetail
      parameters:
        - $ref: '#/components/parameters/PackId'
      responses:
        '200':
          description: Pack detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /packs/{pack_id}/enroll:
    post:
      tags: [Pack]
      summary: Enroll a pack into current learning plan
      operationId: enrollPack
      parameters:
        - $ref: '#/components/parameters/PackId'
      responses:
        '200':
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessage'

  /packs/generate:
    post:
      tags: [Pack]
      summary: Create AI generation job
      operationId: createPackGenerationJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePackRequest'
      responses:
        '202':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobResponse'

  /packs/generation-jobs/{job_id}:
    get:
      tags: [Pack]
      summary: Get generation job status
      operationId: getGenerationJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /progress/summary:
    get:
      tags: [Progress]
      summary: Get progress summary
      operationId: getProgressSummary
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [7d, 30d, 90d]
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressSummaryResponse'

  /progress/daily:
    get:
      tags: [Progress]
      summary: Get daily progress series
      operationId: getProgressDaily
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daily data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressDailyResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PlanId:
      in: path
      name: plan_id
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      in: path
      name: task_id
      required: true
      schema:
        type: string
        format: uuid
    PackId:
      in: path
      name: pack_id
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CefrLevel:
      type: string
      enum: [A1, A2, B1, B2, C1, C2]

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [code, message]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        locale:
          type: string
        timezone:
          type: string
      required: [id, email, locale, timezone]

    UserLearningProfile:
      type: object
      properties:
        current_level:
          $ref: '#/components/schemas/CefrLevel'
        target_domain:
          type: string
        daily_minutes:
          type: integer
        weekly_goal_days:
          type: integer
      required: [current_level, target_domain, daily_minutes, weekly_goal_days]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        locale:
          type: string
          default: zh-CN
        timezone:
          type: string
          default: Asia/Shanghai
      required: [email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
      required: [access_token, refresh_token, expires_in]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        tokens:
          $ref: '#/components/schemas/AuthTokens'
      required: [user, tokens]

    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        learning_profile:
          $ref: '#/components/schemas/UserLearningProfile'
      required: [user, learning_profile]

    UpdateProfileRequest:
      type: object
      properties:
        current_level:
          $ref: '#/components/schemas/CefrLevel'
        target_domain:
          type: string
        daily_minutes:
          type: integer
          minimum: 5
          maximum: 180
        weekly_goal_days:
          type: integer
          minimum: 1
          maximum: 7

    BootstrapPlanRequest:
      type: object
      properties:
        level:
          $ref: '#/components/schemas/CefrLevel'
        target_domain:
          type: string
        daily_minutes:
          type: integer
          minimum: 5
          maximum: 180
        days:
          type: integer
          minimum: 3
          maximum: 14
          default: 7
      required: [level, target_domain, daily_minutes]

    PlanTask:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        task_type:
          type: string
          enum: [input, retrieval_quiz, review, output]
        title:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed]
        estimated_minutes:
          type: integer
        virtual:
          type: boolean
          description: If true, this task is dynamically injected (e.g. due review cards) and cannot be completed via the complete-task endpoint.
      required: [task_id, task_type, title, status, estimated_minutes]

    DailyPlan:
      type: object
      properties:
        plan_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        mode:
          type: string
          enum: [fast_10m, full_20m]
        total_estimated_minutes:
          type: integer
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/PlanTask'
      required: [plan_id, date, mode, total_estimated_minutes, tasks]

    DailyPlanResponse:
      type: object
      properties:
        daily_plan:
          $ref: '#/components/schemas/DailyPlan'
      required: [daily_plan]

    WeeklyPlanResponse:
      type: object
      properties:
        week_start:
          type: string
          format: date
        daily_plans:
          type: array
          items:
            $ref: '#/components/schemas/DailyPlan'
      required: [week_start, daily_plans]

    CompleteTaskRequest:
      type: object
      properties:
        completed_at:
          type: string
          format: date-time
        duration_seconds:
          type: integer
          minimum: 0
      required: [completed_at]

    TaskCompletionResponse:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed]
        next_recommendation:
          type: string
      required: [task_id, status]

    ReviewCard:
      type: object
      properties:
        card_id:
          type: string
          format: uuid
        user_card_state_id:
          type: string
          format: uuid
        front_text:
          type: string
        back_text:
          type: string
        example_text:
          type: string
        due_at:
          type: string
          format: date-time
      required: [card_id, user_card_state_id, front_text, back_text, due_at]

    ReviewQueueResponse:
      type: object
      properties:
        due_count:
          type: integer
        cards:
          type: array
          items:
            $ref: '#/components/schemas/ReviewCard'
      required: [due_count, cards]

    ReviewSubmitRequest:
      type: object
      properties:
        card_id:
          type: string
          format: uuid
        user_card_state_id:
          type: string
          format: uuid
        rating:
          type: string
          enum: [again, hard, good, easy]
        reviewed_at:
          type: string
          format: date-time
        response_ms:
          type: integer
          minimum: 0
        client_event_id:
          type: string
          format: uuid
      required: [card_id, user_card_state_id, rating, reviewed_at, client_event_id]

    ReviewSubmitResponse:
      type: object
      properties:
        accepted:
          type: boolean
        card_id:
          type: string
          format: uuid
        next_due_at:
          type: string
          format: date-time
        scheduled_days:
          type: integer
        status:
          type: string
          enum: [learning, review, relearning]
      required: [accepted, card_id, next_due_at, scheduled_days, status]

    ProgressSummaryResponse:
      type: object
      properties:
        range:
          type: string
        total_minutes:
          type: integer
        active_days:
          type: integer
        review_accuracy:
          type: number
          format: float
        cards_reviewed:
          type: integer
        streak_count:
          type: integer
      required: [range, total_minutes, active_days, review_accuracy, cards_reviewed, streak_count]

    ProgressDailyPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        minutes_learned:
          type: integer
        cards_reviewed:
          type: integer
        review_accuracy:
          type: number
          format: float
      required: [date, minutes_learned, cards_reviewed]

    ProgressDailyResponse:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: '#/components/schemas/ProgressDailyPoint'
      required: [points]

    GenericMessage:
      type: object
      properties:
        message:
          type: string
      required: [message]

    Pack:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
          enum: [official, ai]
        title:
          type: string
        description:
          type: string
        domain:
          type: string
        level:
          $ref: '#/components/schemas/CefrLevel'
        estimated_minutes:
          type: integer
      required: [id, source, title, domain, level, estimated_minutes]

    PackListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Pack'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
      required: [items, page, page_size, total]

    PackDetailResponse:
      type: object
      properties:
        pack:
          $ref: '#/components/schemas/Pack'
        lessons:
          type: array
          items:
            type: object
            properties:
              lesson_id:
                type: string
                format: uuid
              title:
                type: string
              lesson_type:
                type: string
                enum: [reading, listening, speaking, writing, mixed]
              position:
                type: integer
            required: [lesson_id, title, lesson_type, position]
      required: [pack, lessons]

    GeneratePackRequest:
      type: object
      properties:
        level:
          $ref: '#/components/schemas/CefrLevel'
        domain:
          type: string
        daily_minutes:
          type: integer
          minimum: 5
          maximum: 180
        days:
          type: integer
          minimum: 3
          maximum: 14
          default: 7
        focus_skills:
          type: array
          items:
            type: string
            enum: [listening, speaking, reading, writing]
      required: [level, domain, daily_minutes]

    GenerationJobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, success, failed]
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        pack_id:
          type: string
          format: uuid
          nullable: true
        error_message:
          type: string
          nullable: true
      required: [job_id, status, created_at]
